<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Digital Sanctuary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0a0a0f;
  --bg2:#0f0f1a;
  --g1:#7c3aed;--g2:#2563eb;--g3:#06b6d4;
  --grad:linear-gradient(135deg,#7c3aed,#2563eb,#06b6d4);
  --grad2:linear-gradient(135deg,#7c3aed44,#2563eb44);
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.08);
  --glassbdr:rgba(255,255,255,0.08);
  --glassbdr2:rgba(255,255,255,0.14);
  --t1:#f0f0ff;--t2:#8888aa;--t3:#44445a;
  --grn:#10d97a;--grnbg:rgba(16,217,122,0.12);
  --err:#ff5566;--errbg:rgba(255,85,102,0.12);
  --amr:#f59e0b;--ambg:rgba(245,158,11,0.12);
  --pur:#a855f7;--purbg:rgba(168,85,247,0.12);
  --r:16px;--r2:12px;--r3:8px;
  --ff:'Inter',-apple-system,sans-serif;
  --ffm:'JetBrains Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}

body{
  background:var(--bg);
  color:var(--t1);
  font-family:var(--ff);
  min-height:100vh;
  overflow-x:hidden;
  overscroll-behavior:none;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--glass2);border-radius:3px}

/* BG GRADIENT ORBS */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(124,58,237,0.15) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%,rgba(6,182,212,0.1) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* HEADER */
header{
  position:sticky;top:0;z-index:99;
  background:rgba(10,10,15,0.8);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glassbdr);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
  height:54px;
  padding-top:env(safe-area-inset-top,0);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:30px;height:30px;border-radius:9px;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(124,58,237,0.5);
}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* MAIN */
main{
  padding:20px 14px calc(72px + var(--safe-b));
  max-width:680px;margin:0 auto;
  position:relative;z-index:1;
}

/* NAV */
nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,10,20,0.85);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--glassbdr);
  display:flex;justify-content:space-around;align-items:center;
  height:calc(60px + var(--safe-b));
  padding-bottom:var(--safe-b);
  z-index:99;
}
.nv{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;padding:6px 14px;
  color:var(--t3);transition:all .2s;border-radius:10px;
}
.nv.on{color:var(--g1)}
.nv svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
.nv.on svg{filter:drop-shadow(0 0 6px var(--g1))}
.nv span{font-size:10px;font-weight:700;letter-spacing:.5px;transition:all .2s}

/* GLASS CARD */
.card{
  background:var(--glass);
  border:1px solid var(--glassbdr);
  border-radius:var(--r);
  padding:20px;
  backdrop-filter:blur(10px);
  transition:border-color .2s;
}
.card:hover{border-color:var(--glassbdr2)}
.card2{
  background:var(--glass2);
  border:1px solid var(--glassbdr);
  border-radius:var(--r2);
  padding:14px;
}

/* GRADIENT CARD */
.gcard{
  background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(37,99,235,0.1));
  border:1px solid rgba(124,58,237,0.3);
  border-radius:var(--r);
  padding:20px;
}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.4px}
.chip-pur{background:var(--purbg);color:var(--pur);border:1px solid rgba(168,85,247,0.3)}
.chip-blue{background:rgba(37,99,235,0.15);color:#60a5fa;border:1px solid rgba(37,99,235,0.3)}
.chip-grn{background:var(--grnbg);color:var(--grn);border:1px solid rgba(16,217,122,0.3)}
.chip-red{background:var(--errbg);color:var(--err);border:1px solid rgba(255,85,102,0.3)}
.chip-amber{background:var(--ambg);color:var(--amr);border:1px solid rgba(245,158,11,0.3)}
.chip-gray{background:rgba(255,255,255,0.06);color:var(--t2);border:1px solid var(--glassbdr)}

/* BUTTONS */
.btn{
  background:var(--grad);color:#fff;border:none;
  border-radius:var(--r2);padding:10px 22px;
  font-size:13px;font-weight:700;
  box-shadow:0 4px 20px rgba(124,58,237,0.4);
  transition:all .2s;
}
.btn:hover{box-shadow:0 4px 28px rgba(124,58,237,0.6);transform:translateY(-1px)}
.btn:active{transform:scale(.96)}
.btn-out{
  background:var(--glass);border:1px solid var(--glassbdr2);
  border-radius:var(--r2);padding:8px 16px;
  font-size:13px;color:var(--t2);
  backdrop-filter:blur(8px);transition:all .2s;
}
.btn-out:hover{background:var(--glass2);color:var(--t1);border-color:rgba(124,58,237,0.4)}
.btn-out:active{transform:scale(.96)}
.btn-icon{
  background:transparent;border:none;padding:6px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--t3);transition:all .2s;
}
.btn-icon:hover{background:var(--glass2);color:var(--t1)}
.btn-icon:active{transform:scale(.9)}
.btn-icon.del:hover{background:var(--errbg);color:var(--err)}

/* SECTION LABEL */
.sl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}

/* TABS */
.tabs{display:flex;background:var(--glass);border:1px solid var(--glassbdr);border-radius:10px;padding:3px;gap:2px}
.tab{padding:7px 18px;border-radius:7px;border:none;font-size:12px;font-weight:700;background:transparent;color:var(--t2);transition:all .2s;letter-spacing:.3px}
.tab.on{background:var(--grad);color:#fff;box-shadow:0 2px 12px rgba(124,58,237,0.4)}

/* INPUTS */
.finput{
  background:transparent;border:none;
  border-bottom:1px solid var(--glassbdr2);
  color:var(--t1);padding:10px 0;font-size:14px;width:100%;
  transition:border-color .2s;
}
.finput:focus{outline:none;border-bottom-color:var(--g1)}
.finput::placeholder{color:var(--t3)}
.ftarea{
  background:transparent;border:none;
  border-bottom:1px solid var(--glassbdr2);
  color:var(--t1);padding:10px 0;font-size:14px;width:100%;
  resize:none;transition:border-color .2s;
}
.ftarea:focus{outline:none;border-bottom-color:var(--g1)}
.ftarea::placeholder{color:var(--t3)}
.fselect{
  background:var(--glass2);border:1px solid var(--glassbdr);
  border-radius:var(--r3);padding:8px 12px;
  color:var(--t1);font-size:12px;font-family:var(--ff);
}
.fselect:focus{outline:none;border-color:var(--g1)}

/* PROGRESS BAR */
.pbar{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:var(--grad);transition:width .8s cubic-bezier(.4,0,.2,1)}
.pfill-grn{background:linear-gradient(90deg,#059669,var(--grn))}

/* CHECKBOX */
.chk{
  width:20px;height:20px;border-radius:6px;
  border:2px solid var(--glassbdr2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;
}
.chk.on{border-color:var(--g1);background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(37,99,235,0.3))}
.chk:active{transform:scale(.85)}

/* TASK ROW */
.trow{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;
  background:var(--glass);
  border:1px solid var(--glassbdr);
  border-radius:var(--r2);
  transition:all .2s;
  backdrop-filter:blur(8px);
}
.trow:hover{border-color:var(--glassbdr2);background:var(--glass2)}
.trow:hover .delb,.trow:active .delb{opacity:1}
.delb{opacity:0;transition:opacity .2s}

/* HABIT ROW */
.hrow{
  display:flex;align-items:center;gap:12px;
  padding:14px;
  background:var(--glass);
  border:1px solid var(--glassbdr);
  border-radius:var(--r2);
  transition:all .3s;
  backdrop-filter:blur(8px);
}
.hrow.done{
  background:linear-gradient(135deg,rgba(16,217,122,0.08),rgba(6,182,212,0.05));
  border-color:rgba(16,217,122,0.25);
}
.hchk{
  width:28px;height:28px;border-radius:8px;
  border:2px solid var(--glassbdr2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;
}
.hchk.on{border-color:var(--grn);background:var(--grnbg)}
.hchk:active{transform:scale(.85)}

/* SEARCH */
.swrap{position:relative}
.swrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.sinput{
  background:var(--glass);border:1px solid var(--glassbdr);
  border-radius:var(--r2);padding:10px 14px 10px 36px;
  font-size:13px;color:var(--t1);width:100%;
  backdrop-filter:blur(8px);transition:border-color .2s;
}
.sinput:focus{outline:none;border-color:rgba(124,58,237,0.5)}
.sinput::placeholder{color:var(--t3)}

/* LOG ENTRY */
.lentry{border-radius:var(--r2);overflow:hidden;border:1px solid var(--glassbdr);backdrop-filter:blur(8px)}
.lhead{display:flex;align-items:center;gap:14px;padding:13px 14px;cursor:pointer;background:var(--glass);transition:background .2s}
.lhead:hover{background:var(--glass2)}
.lbody{padding:14px 16px;background:rgba(0,0,0,0.2);border-top:1px solid var(--glassbdr);display:flex;flex-direction:column;gap:12px}

/* NOTES PANEL */
.npanel{
  position:fixed;bottom:calc(68px + var(--safe-b));right:14px;
  width:min(310px,calc(100vw - 28px));
  background:rgba(15,15,26,0.95);
  border:1px solid var(--glassbdr2);
  border-radius:var(--r);
  box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(124,58,237,0.1);
  z-index:200;overflow:hidden;
  backdrop-filter:blur(24px);
}

/* ANIMATIONS */
.screen{animation:fadeUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.pop{animation:pop .2s cubic-bezier(.4,0,.2,1)}
@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease infinite}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* GRADIENT TEXT */
.gtext{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* STREAK FIRE */
@keyframes fireAnim{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.1) rotate(3deg)}}
.fire{display:inline-block;animation:fireAnim 1.5s ease infinite}

/* RING GLOW */
@keyframes ringGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(124,58,237,0.6))}50%{filter:drop-shadow(0 0 14px rgba(124,58,237,0.9))}}
.ring-active{animation:ringGlow 2s ease infinite}

/* MOOD BUTTONS */
.mood-btn{
  flex:1;font-size:22px;padding:10px 0;
  border-radius:10px;border:2px solid var(--glassbdr);
  background:var(--glass);cursor:pointer;
  transition:all .2s;backdrop-filter:blur(8px);
}
.mood-btn:active{transform:scale(.88)}

/* EMPTY STATE */
.empty{
  text-align:center;padding:40px 20px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.empty-icon{font-size:40px;opacity:.4}
.empty-text{font-size:13px;color:var(--t3)}

/* GOAL CARD */
.gcard-goal{
  background:var(--glass);
  border:1px solid var(--glassbdr);
  border-radius:var(--r);padding:18px;
  backdrop-filter:blur(10px);
  transition:all .3s;
}
.gcard-goal.done-goal{
  background:linear-gradient(135deg,rgba(16,217,122,0.08),transparent);
  border-color:rgba(16,217,122,0.3);
}

/* STAT CARD */
.stat{
  background:var(--glass);border:1px solid var(--glassbdr);
  border-radius:var(--r2);padding:14px;text-align:center;
  backdrop-filter:blur(8px);
}
.stat-val{font-size:20px;font-weight:800;font-family:var(--ffm);line-height:1}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-top:4px}

/* ADD FORM CARD */
.add-card{
  background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(37,99,235,0.05));
  border:1px solid rgba(124,58,237,0.2);
  border-radius:var(--r);padding:18px;
  backdrop-filter:blur(10px);
}
</style>
</head>
<body>

<div style="position:relative;z-index:1">
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    <span class="logo-text">Digital Sanctuary</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="hdr-date" style="font-size:11px;color:var(--t3)"></span>
    <button class="btn-icon" id="notes-btn" onclick="toggleNotes()" style="border:1px solid transparent;border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:5px">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span style="font-size:11px;font-weight:600">Notes</span>
    </button>
  </div>
</header>

<main id="mc"></main>

<nav>
  <button class="nv on" data-tab="focus" onclick="go('focus')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>Focus</span>
  </button>
  <button class="nv" data-tab="tasks" onclick="go('tasks')">
    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span>Tasks</span>
  </button>
  <button class="nv" data-tab="habits" onclick="go('habits')">
    <svg viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
    <span>Habits</span>
  </button>
  <button class="nv" data-tab="goals" onclick="go('goals')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    <span>Goals</span>
  </button>
  <button class="nv" data-tab="journal" onclick="go('journal')">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <span>Journal</span>
  </button>
</nav>
</div>

<!-- Notes Panel -->
<div id="npanel" class="npanel" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--glassbdr)">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">📝</span>
      <span style="font-size:13px;font-weight:700">Quick Notes</span>
    </div>
    <button class="btn-icon" onclick="toggleNotes()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <textarea id="ntxt" placeholder="Brain dump anything here...&#10;Auto-saved instantly ✓" oninput="saveNote(this)" style="width:100%;height:210px;background:transparent;border:none;padding:14px;color:var(--t1);font-size:13px;line-height:1.8;resize:none;outline:none;font-family:var(--ff)"></textarea>
  <div style="padding:8px 14px;border-top:1px solid var(--glassbdr);display:flex;justify-content:space-between;align-items:center">
    <span id="nchars" style="font-size:11px;color:var(--t3)">0 chars · auto-saved</span>
    <button class="btn-icon del" onclick="clearNote()" style="font-size:11px;display:flex;gap:4px;align-items:center;padding:4px 8px">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>Clear
    </button>
  </div>
</div>
<div id="noverlay" style="display:none;position:fixed;inset:0;z-index:199" onclick="toggleNotes()"></div>

<script>
// ═══════════════════════════════════
// CORE
// ═══════════════════════════════════
var DB={
  get:function(k,d){try{var v=localStorage.getItem('ds4_'+k);return v!==null?JSON.parse(v):d;}catch(e){return d;}},
  set:function(k,v){try{localStorage.setItem('ds4_'+k,JSON.stringify(v));}catch(e){}}
};
var uid=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);};
var fmt=function(s){return ('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2);};
var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var TK=function(){return new Date().toISOString().slice(0,10);};
var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');};

function beep(f,d,v){try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator();var g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f||880;o.type='sine';g.gain.setValueAtTime(v||.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+(d||.15));o.start();o.stop(c.currentTime+(d||.15));}catch(e){}}
function chime(){beep(523,.12,.2);setTimeout(function(){beep(659,.12,.18);},130);setTimeout(function(){beep(784,.2,.15);},270);}

// Header
document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

// Space bar
document.addEventListener('keydown',function(e){if(e.code==='Space'&&e.target===document.body){e.preventDefault();if(typeof FT!=='undefined')FT();}});

// ═══════════════════════════════════
// ROUTER
// ═══════════════════════════════════
var TAB=DB.get('tab','focus');
function go(t){
  TAB=t;DB.set('tab',t);
  document.querySelectorAll('.nv').forEach(function(b){b.classList.toggle('on',b.dataset.tab===t);});
  render();
}
function render(){
  var mc=document.getElementById('mc');
  mc.innerHTML='';
  mc.className='screen';
  void mc.offsetWidth;
  if(TAB==='focus')renderFocus(mc);
  else if(TAB==='tasks')renderTasks(mc);
  else if(TAB==='habits')renderHabits(mc);
  else if(TAB==='goals')renderGoals(mc);
  else if(TAB==='journal')renderJournal(mc);
}
document.querySelectorAll('.nv').forEach(function(b){b.classList.toggle('on',b.dataset.tab===TAB);});

// ═══════════════════════════════════
// FOCUS
// ═══════════════════════════════════
var FS={
  mode:'focus',
  durs:DB.get('fdurs',{focus:25,break:5}),
  sec:0,running:false,tmr:null,
  session:DB.get('fsess_'+TK(),0),
  total:DB.get('ftotal_'+TK(),0),
  leaks:DB.get('fleaks_'+TK(),[])
};
FS.sec=FS.durs.focus*60;

function FT(){if(FS.sec>0){FS.running=!FS.running;if(FS.running){FS.tmr=setInterval(ftick,1000);}else{clearInterval(FS.tmr);}if(TAB==='focus')render();}}
function ftick(){
  if(FS.sec>0){
    FS.sec--;
    if(FS.mode==='focus'){FS.total++;DB.set('ftotal_'+TK(),FS.total);}
    if(TAB==='focus')updateRing();
  }
  if(FS.sec===0){
    clearInterval(FS.tmr);FS.running=false;chime();
    if(FS.mode==='focus'){FS.session++;DB.set('fsess_'+TK(),FS.session);FS.mode='break';}
    else{FS.mode='focus';}
    FS.sec=FS.durs[FS.mode]*60;
    if(TAB==='focus')render();
  }
}
function updateRing(){
  var el=document.getElementById('ftime');
  var ring=document.getElementById('fring');
  var prog=1-FS.sec/(FS.durs[FS.mode]*60);
  var R=108,C=2*Math.PI*R;
  if(el)el.textContent=fmt(FS.sec);
  if(ring)ring.style.strokeDashoffset=C*(1-prog);
  var tot=document.getElementById('ftot');
  if(tot)tot.textContent=fmt(FS.total);
}

function resetFocus(){clearInterval(FS.tmr);FS.running=false;FS.sec=FS.durs[FS.mode]*60;if(TAB==='focus')render();}
function editDur(){

}
function logD(){
  var s=prompt('What distracted you?','');

function delLeak(id){FS.leaks=FS.leaks.filter(function(l){return l.id!==id;});DB.set('fleaks_'+TK(),FS.leaks);if(TAB==='focus')render();}

function GT(){return DB.get('tasks',[]);}
function ST(t){DB.set('tasks',t);}

function renderTasks(el){
  var tasks=GT();
  var cat=DB.get('tcat','today');

  if(filt==='done')list=list.filter(function(t){return t.done;});

    if(p==='high')return '<span class="chip chip-red">🔴 high</span>';

  };

  el.innerHTML=
  // Progress
  '<div class="gcard" style="margin-bottom:18px">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px">'+
      '<div>'+
        '<div class="sl" style="margin-bottom:5px">today\'s progress</div>'+
        '<div style="font-size:28px;font-weight:800;letter-spacing:-1px">'+pct+'<span style="font-size:16px;font-weight:500;color:var(--t2)">%</span> done</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:22px;font-weight:800;font-family:var(--ffm);color:var(--t2)">'+dn+'/'+all.length+'</div>'+

      '</div>'+
    '</div>'+
    '<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>'+
  '</div>'+

  // Tabs + filters
  '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">'+
    '<div class="tabs">'+
      '<button class="tab '+(cat==='today'?'on':'')+'" onclick="setTCat(\'today\')">Today</button>'+
      '<button class="tab '+(cat==='weekly'?'on':'')+'" onclick="setTCat(\'weekly\')">Weekly</button>'+

      '<select class="fselect" onchange="DB.set(\'tsort\',this.value);if(TAB===\'tasks\')render()">'+

        '<option value="priority"'+(sort==='priority'?' selected':'')+'>Priority</option>'+
        '<option value="status"'+(sort==='status'?' selected':'')+'>Status</option>'+
      '</select>'+
      '<select class="fselect" onchange="DB.set(\'tfilt\',this.value);if(TAB===\'tasks\')render()">'+
        '<option value="all"'+(filt==='all'?' selected':'')+'>All</option>'+
        '<option value="pending"'+(filt==='pending'?' selected':'')+'>Pending</option>'+
        '<option value="done"'+(filt==='done'?' selected':'')+'>Done</option>'+
      '</select>'+
    '</div>'+
  '</div>'+

  // Search
  '<div class="swrap" style="margin-bottom:14px">'+
    '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+

      list.map(function(t){
        return '<div class="trow pop" id="tr-'+t.id+'">'+
          '<div class="chk '+(t.done?'on':'')+'" onclick="togTask(\''+t.id+'\')">'+(t.done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>':'')+'</div>'+

      '<select class="fselect" id="ncat"><option value="today">Today</option><option value="weekly">Weekly</option></select>'+
      '<button class="btn" onclick="addTask()" style="padding:9px 18px">Add</button>'+
    '</div>'+
  '</div>';
}
function setTCat(c){DB.set('tcat',c);if(TAB==='tasks')render();}
function togTask(id){var t=GT();t=t.map(function(x){return x.id===id?Object.assign({},x,{done:!x.done}):x;});ST(t);if(TAB==='tasks')render();}
function delTask(id){ST(GT().filter(function(t){return t.id!==id;}));if(TAB==='tasks')render();}
function clrDone(){ST(GT().filter(function(t){return !t.done;}));if(TAB==='tasks')render();}
function addTask(){
  var ti=document.getElementById('ntitle');
  var di=document.getElementById('ndur');
  var pi=document.getElementById('npri');
  var ci=document.getElementById('ncat');
  if(!ti||!ti.value.trim())return;
  var t=GT();
  t.unshift({id:uid(),title:ti.value.trim(),dur:di&&di.value?di.value:'30m',pri:pi?pi.value:'medium',type:'task',done:false,cat:ci?ci.value:'today'});
  ST(t);if(TAB==='tasks')render();
}
function tsearchFn(q){
  var t=GT();var cat=DB.get('tcat','today');
  var list=t.filter(function(x){return x.cat===cat&&x.title.toLowerCase().includes(q.toLowerCase());});
  var el=document.getElementById('tlist');if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No match found</div></div>';return;}
  var pc=function(p){if(p==='high')return '<span class="chip chip-red">🔴 high</span>';if(p==='medium')return '<span class="chip chip-amber">🟡 medium</span>';return '<span class="chip chip-gray">low</span>';};
  el.innerHTML=list.map(function(t){
    return '<div class="trow" id="tr-'+t.id+'">'+
      '<div class="chk '+(t.done?'on':'')+'" onclick="togTask(\''+t.id+'\')">'+(t.done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':'')+'</div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:'+(t.done?'var(--t3)':'var(--t1)')+';text-decoration:'+(t.done?'line-through':'none')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</div>'+
      '<div style="display:flex;gap:5px;margin-top:5px">'+pc(t.pri)+'<span class="chip chip-gray">'+esc(t.type)+'</span></div></div>'+
      '<button class="btn-icon del delb" onclick="delTask(\''+t.id+'\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg></button>'+
    '</div>';
  }).join('');
}

  )+

  '<div class="add-card">'+
    '<div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:6px">'+
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Habit</div>'+
    '<div style="display:flex;gap:10px;align-items:flex-end">'+
      '<input class="finput" id="nhname" placeholder="Habit name..." style="flex:1" onkeydown="if(event.key===\'Enter\')addHabit()">'+
      '<input id="nhicon" value="⭐" style="width:46px;font-size:22px;background:var(--glass2);border:1px solid var(--glassbdr);border-radius:9px;text-align:center;padding:6px 4px">'+
      '<button class="btn" onclick="addHabit()" style="padding:9px 18px">Add</button>'+
    '</div>'+
  '</div>';
}
function togHabit(id){
  var h=GH();
  h=h.map(function(x){return x.id===id?Object.assign({},x,{done:!x.done,streak:!x.done?x.streak+1:Math.max(0,x.streak-1)}):x;});
  SH(h);if(TAB==='habits')render();
}
function delHabit(id){SH(GH().filter(function(h){return h.id!==id;}));if(TAB==='habits')render();}
function addHabit(){
  var n=document.getElementById('nhname');var ic=document.getElementById('nhicon');
  if(!n||!n.value.trim())return;
  var h=GH();h.push({id:uid(),name:n.value.trim(),icon:ic?ic.value:'⭐',streak:0,done:false});
  SH(h);if(TAB==='habits')render();
}

// ═══════════════════════════════════
// GOALS
// ═══════════════════════════════════
function GG(){return DB.get('goals',[]);}
function SG(g){DB.set('goals',g);}

function renderGoals(el){
  var goals=GG();

  el.innerHTML=
  '<div style="margin-bottom:24px">'+
    '<div class="sl" style="margin-bottom:6px">long term</div>'+
    '<div style="font-size:32px;font-weight:800;letter-spacing:-1.5px" class="gtext">Goals</div>'+
  '</div>'+

  (goals.length===0?
    '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No goals yet. Set your first one!</div></div>':
    goals.map(function(g){
      return '<div class="gcard-goal '+(g.pct>=100?'done-goal':'')+' pop" style="margin-bottom:14px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:16px;font-weight:700;color:'+(g.pct>=100?'var(--grn)':'var(--t1)')+';margin-bottom:3px">'+(g.pct>=100?'✅ ':'')+esc(g.title)+'</div>'+
            (g.desc?'<div style="font-size:12px;color:var(--t3);margin-bottom:4px">'+esc(g.desc)+'</div>':'')+
            (g.target&&g.target!=='—'?'<div style="display:flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span style="font-size:11px;color:var(--t3)">'+esc(g.target)+'</span></div>':'')+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:6px;margin-left:14px">'+
            '<input type="number" value="'+g.pct+'" min="0" max="100" onchange="setGPct(\''+g.id+'\',this.value)" style="width:52px;font-size:20px;font-weight:800;font-family:var(--ffm);background:transparent;border:none;outline:none;text-align:right;color:'+(g.pct>=100?'var(--grn)':'var(--t1)')+'">'+
            '<span style="font-size:20px;font-weight:800;color:'+(g.pct>=100?'var(--grn)':'var(--t1)')+'">%</span>'+
            '<button class="btn-icon del" onclick="delGoal(\''+g.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg></button>'+
          '</div>'+
        '</div>'+
        '<div class="pbar" style="margin-bottom:14px"><div class="pfill '+(g.pct>=100?'pfill-grn':'')+'" style="width:'+g.pct+'%"></div></div>'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
          '<button class="btn-out" onclick="adjG(\''+g.id+'\',5)" style="font-size:12px;padding:6px 12px">+5%</button>'+
          '<button class="btn-out" onclick="adjG(\''+g.id+'\',-5)" style="font-size:12px;padding:6px 12px">-5%</button>'+
          '<button class="btn-out" onclick="adjG(\''+g.id+'\',10)" style="font-size:12px;padding:6px 12px">+10%</button>'+
          (g.pct<100?'<button onclick="setGPct(\''+g.id+'\',100)" style="font-size:12px;padding:6px 14px;background:var(--grnbg);border:1px solid rgba(16,217,122,.3);border-radius:8px;color:var(--grn);font-weight:700;cursor:pointer;transition:all .2s">✓ Done</button>':'')+
        '</div>'+
      '</div>';
    }).join('')
  )+

  '<div class="add-card">'+
    '<div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:6px">'+
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>New Goal</div>'+
    '<input class="finput" id="ngt" placeholder="Goal title..." style="margin-bottom:12px">'+
    '<input class="finput" id="ngd" placeholder="Short description..." style="margin-bottom:12px">'+
    '<input class="finput" id="ngg" placeholder="Target date (e.g. Dec 2024)" style="margin-bottom:16px">'+
    '<button class="btn" onclick="addGoal()">Add Goal</button>'+
  '</div>';
}
function adjG(id,d){var g=GG();g=g.map(function(x){return x.id===id?Object.assign({},x,{pct:Math.min(100,Math.max(0,x.pct+d))}):x;});SG(g);if(TAB==='goals')render();}
function setGPct(id,v){var g=GG();g=g.map(function(x){return x.id===id?Object.assign({},x,{pct:Math.min(100,Math.max(0,parseInt(v)||0))}):x;});SG(g);if(TAB==='goals')render();}
function delGoal(id){SG(GG().filter(function(g){return g.id!==id;}));if(TAB==='goals')render();}
function addGoal(){
  var t=document.getElementById('ngt');
  var d=document.getElementById('ngd');
  var g2=document.getElementById('ngg');
  if(!t||!t.value.trim())return;
  var g=GG();g.push({id:uid(),title:t.value.trim(),desc:d?d.value:'',pct:0,target:g2&&g2.value?g2.value:'—'});
  SG(g);if(TAB==='goals')render();
}

// ═══════════════════════════════════
// JOURNAL
// ═══════════════════════════════════
function GJ(){return DB.get('journal',[]);}
var EXPLOG=null;

function renderJournal(el){
  var MOODS=['😞','😔','😐','🙂','😊'];
  var MC=['var(--err)','#f97316','var(--amr)','#84cc16','var(--grn)'];
  var curMood=DB.get('jmood',3);
  var saved=DB.get('jsaved',false);
  var logs=GJ();

  el.innerHTML=
  '<div style="margin-bottom:22px">'+
    '<div class="sl" style="margin-bottom:6px">internal audit</div>'+
    '<div style="font-size:32px;font-weight:800;letter-spacing:-1.5px" class="gtext">Journal</div>'+
  '</div>'+

  '<div class="card" style="margin-bottom:18px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">'+
      '<span style="font-size:15px;font-weight:700">Today\'s Entry</span>'+
      '<span class="chip '+(saved?'chip-grn':'chip-blue')+'">'+(saved?'✓ Saved':'New entry')+'</span>'+
    '</div>'+

    // Mood
    '<div style="margin-bottom:20px">'+
      '<div class="sl" style="margin-bottom:10px">how was your day?</div>'+
      '<div style="display:flex;gap:8px">'+
        MOODS.map(function(m,i){
          var sel=(curMood-1===i);
          return '<button class="mood-btn" onclick="setMood('+(i+1)+')" style="border-color:'+(sel?MC[i]:'var(--glassbdr)')+';background:'+(sel?MC[i]+'22':'var(--glass)')+';transform:'+(sel?'scale(1.1)':'scale(1)')+'">'+m+'</button>';
        }).join('')+
      '</div>'+
    '</div>'+

    [['What went well?','jgood','Deep work session...'],['What failed?','jbad','Got distracted by...'],['Why? (root cause)','jwhy','Because...']]
      .map(function(r){
        return '<div style="margin-bottom:16px">'+
          '<div class="sl" style="margin-bottom:9px">'+r[0]+'</div>'+
          (r[1]==='jwhy'?
            '<textarea class="ftarea" id="'+r[1]+'" rows="2" placeholder="'+r[2]+'"></textarea>':
            '<input class="finput" id="'+r[1]+'" placeholder="'+r[2]+'">'
          )+'</div>';
      }).join('')+

    '<button class="btn" onclick="commitJ()" style="width:100%;padding:13px;font-size:14px;margin-top:4px">Commit Entry</button>'+
  '</div>'+

  // Search
  '<div class="swrap" style="margin-bottom:14px">'+
    '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+
    '<input class="sinput" placeholder="Search journal..." oninput="jsearch(this.value)">'+
  '</div>'+

  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
    '<span style="font-size:14px;font-weight:700">Past Entries</span>'+
    '<span style="font-size:12px;color:var(--t3)">'+logs.length+' entries</span>'+
  '</div>'+

  '<div id="jlist">'+
    (logs.length===0?
      '<div class="empty"><div class="empty-icon">📓</div><div class="empty-text">No entries yet. Start reflecting!</div></div>':
      renderJList(logs,MOODS,MC)
    )+
  '</div>';
}
function renderJList(logs,M,MC){
  if(!M){M=['😞','😔','😐','🙂','😊'];MC=['var(--err)','#f97316','var(--amr)','#84cc16','var(--grn)'];}
  return logs.map(function(log){
    var ex=EXPLOG===log.id;
    return '<div class="lentry pop" style="margin-bottom:6px">'+
      '<div class="lhead" onclick="expLog(\''+log.id+'\')">'+
        '<div style="text-align:center;width:36px;flex-shrink:0">'+
          '<div class="sl">'+esc(log.month)+'</div>'+
          '<div style="font-size:20px;font-weight:800;font-family:var(--ffm);line-height:1.1">'+log.date+'</div>'+
        '</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">'+
            (log.mood?'<span style="font-size:15px">'+M[log.mood-1]+'</span>':'')+
            '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(log.title)+'</div>'+
          '</div>'+
          '<div style="display:flex;gap:4px;flex-wrap:wrap">'+(log.tags||[]).map(function(t){return '<span class="chip chip-gray" style="font-size:10px">#'+esc(t)+'</span>';}).join('')+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:4px">'+
          '<button class="btn-icon del" onclick="event.stopPropagation();delLog(\''+log.id+'\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg></button>'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" stroke-linecap="round" style="transition:transform .2s;transform:'+(ex?'rotate(180deg)':'none')+'"><polyline points="6 9 12 15 18 9"/></svg>'+
        '</div>'+
      '</div>'+
      (ex?'<div class="lbody">'+
        (log.good?'<div><div style="font-size:10px;color:var(--grn);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Went well</div><div style="font-size:13px;color:var(--t2);line-height:1.7">'+esc(log.good)+'</div></div>':'')+
        (log.bad?'<div><div style="font-size:10px;color:var(--err);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Failed</div><div style="font-size:13px;color:var(--t2);line-height:1.7">'+esc(log.bad)+'</div></div>':'')+
        (log.why?'<div><div style="font-size:10px;color:var(--amr);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Root cause</div><div style="font-size:13px;color:var(--t2);line-height:1.7">'+esc(log.why)+'</div></div>':'')+
      '</div>':'')+
    '</div>';
  }).join('');
}
function expLog(id){EXPLOG=EXPLOG===id?null:id;if(TAB==='journal')render();}
function delLog(id){DB.set('journal',GJ().filter(function(l){return l.id!==id;}));if(TAB==='journal')render();}
function setMood(v){DB.set('jmood',v);if(TAB==='journal')render();}
function commitJ(){
  var g=document.getElementById('jgood');
  var b=document.getElementById('jbad');
  var w=document.getElementById('jwhy');
  if(!g||(!g.value&&!(b&&b.value)))return;
  var now=new Date();
  var entry={id:uid(),date:now.getDate(),month:MO[now.getMonth()],title:(g&&g.value?g.value:'Reflection').slice(0,42),tags:['New'],good:g?g.value:'',bad:b?b.value:'',why:w?w.value:'',mood:DB.get('jmood',3)};
  var j=GJ();j.unshift(entry);DB.set('journal',j);
  DB.set('jsaved',true);setTimeout(function(){DB.set('jsaved',false);},3000);
  if(TAB==='journal')render();
}
function jsearch(q){
  var logs=GJ().filter(function(l){return l.title.toLowerCase().includes(q.toLowerCase());});
  var el=document.getElementById('jlist');
  if(el)el.innerHTML=logs.length?renderJList(logs,null,null):'<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No match</div></div>';
}

// ═══════════════════════════════════
// NOTES
// ═══════════════════════════════════
var nopen=false;
function toggleNotes(){
  nopen=!nopen;
  var p=document.getElementById('npanel');
  var o=document.getElementById('noverlay');
  var b=document.getElementById('notes-btn');
  p.style.display=nopen?'block':'none';
  o.style.display=nopen?'block':'none';
  b.style.background=nopen?'var(--purbg)':'transparent';
  b.style.color=nopen?'var(--pur)':'var(--t3)';
  b.style.borderColor=nopen?'rgba(168,85,247,.3)':'transparent';
  if(nopen){
    var t=document.getElementById('ntxt');
    t.value=DB.get('notes','');
    document.getElementById('nchars').textContent=t.value.length+' chars · auto-saved';
  }
}
function saveNote(t){DB.set('notes',t.value);document.getElementById('nchars').textContent=t.value.length+' chars · auto-saved';}
function clearNote(){document.getElementById('ntxt').value='';DB.set('notes','');document.getElementById('nchars').textContent='0 chars · auto-saved';}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
render();
</script>
</body>
</html>
