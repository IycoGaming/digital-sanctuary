<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Sanctuary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--s1:#0d1117;--s2:#161b22;--s3:#21262d;--s4:#2d333b;
  --t1:#e6edf3;--t2:#7d8590;--t3:#444c56;
  --acc:#58a6ff;--acc2:#1f6feb;--abg:#58a6ff20;--abdr:#58a6ff40;
  --grn:#3fb950;--gbg:#3fb95020;--gbdr:#3fb95040;
  --err:#f85149;--ebg:#f8514920;--ebdr:#f8514940;
  --amr:#e3b341;--ambg:#e3b34120;--ambdr:#e3b34140;
  --bd:1px solid #21262d;
}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
button:active{opacity:.8;transform:scale(.97)}
input,textarea,select{font-family:inherit;background:transparent;color:var(--t1)}
input::placeholder,textarea::placeholder{color:var(--t3)}
input:focus,textarea:focus,select:focus{outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}

/* layout */
#app{display:flex;flex-direction:column;min-height:100vh}
header{position:sticky;top:0;z-index:99;background:#07090dee;backdrop-filter:blur(16px);border-bottom:var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px}
main{flex:1;padding:18px 14px 80px;max-width:700px;margin:0 auto;width:100%}
nav{position:fixed;bottom:0;left:0;right:0;background:#0d1117f0;backdrop-filter:blur(20px);border-top:var(--bd);display:flex;justify-content:space-around;align-items:center;height:60px;z-index:99}

/* cards */
.card{background:var(--s1);border:var(--bd);border-radius:12px;padding:18px}
.card2{background:var(--s2);border:var(--bd);border-radius:8px;padding:14px}

/* chips */
.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.3px;gap:3px}
.chip-blue{background:var(--abg);color:var(--acc);border:1px solid var(--abdr)}
.chip-green{background:var(--gbg);color:var(--grn);border:1px solid var(--gbdr)}
.chip-red{background:var(--ebg);color:var(--err);border:1px solid var(--ebdr)}
.chip-amber{background:var(--ambg);color:var(--amr);border:1px solid var(--ambdr)}
.chip-gray{background:var(--s3);color:var(--t2);border:1px solid var(--s4)}

/* buttons */
.btn{background:var(--acc);color:#040d14;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;transition:background .15s}
.btn:hover{background:var(--acc2)}
.btn-out{background:transparent;border:var(--bd);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--t2);transition:all .15s}
.btn-out:hover{background:var(--s2);color:var(--t1)}
.btn-icon{background:transparent;border:none;padding:5px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s}
.btn-icon:hover{background:var(--s2);color:var(--t1)}
.btn-icon.del:hover{background:var(--ebg);color:var(--err)}

/* nav items */
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:5px 12px;color:var(--t3);transition:color .15s}
.nav-item.active{color:var(--acc)}
.nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active svg{fill:currentColor}
.nav-item span{font-size:10px;font-weight:700;letter-spacing:.5px}

/* form inputs */
.f-input{background:transparent;border:none;border-bottom:1px solid var(--s3);color:var(--t1);padding:8px 0;font-size:14px;width:100%;transition:border-color .2s}
.f-input:focus{border-bottom-color:var(--acc)}
.f-textarea{background:transparent;border:none;border-bottom:1px solid var(--s3);color:var(--t1);padding:8px 0;font-size:14px;width:100%;resize:none;transition:border-color .2s}
.f-textarea:focus{border-bottom-color:var(--acc)}
.f-select{background:var(--s2);border:var(--bd);border-radius:7px;padding:7px 10px;color:var(--t1);font-size:13px}

/* task row */
.task-row{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--s1);border:var(--bd);border-radius:8px;transition:border-color .15s}
.task-row:hover{border-color:var(--s4)}
.task-row:hover .del-btn,.task-row:focus-within .del-btn{opacity:1}
.del-btn{opacity:0;transition:opacity .15s}

/* checkbox */
.chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--s4);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.chk.done{border-color:var(--acc);background:var(--abg)}

/* progress bar */
.pbar{height:3px;background:var(--s3);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width .6s ease}

/* section label */
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}

/* tabs */
.tabs{display:flex;background:var(--s1);border:var(--bd);border-radius:9px;padding:3px;gap:2px}
.tab{padding:7px 16px;border-radius:6px;border:none;font-size:13px;font-weight:600;background:transparent;color:var(--t2);transition:all .15s}
.tab.on{background:var(--s3);color:var(--t1)}

/* search */
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.search-input{background:var(--s2);border:var(--bd);border-radius:8px;padding:9px 14px 9px 34px;font-size:13px;color:var(--t1);width:100%;transition:border-color .2s}
.search-input:focus{outline:none;border-color:var(--acc)}
.search-input::placeholder{color:var(--t3)}

/* habit row */
.habit-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:9px;border:1px solid var(--s3);transition:all .2s}
.habit-row.done{border-color:var(--gbdr);background:var(--gbg)}
.hchk{width:28px;height:28px;border-radius:7px;border:2px solid var(--s4);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.hchk.done{border-color:var(--grn);background:var(--gbg)}

/* notes panel */
.notes-panel{position:fixed;bottom:68px;right:14px;width:min(300px,calc(100vw - 28px));background:var(--s1);border:var(--bd);border-radius:12px;box-shadow:0 8px 40px #000a;z-index:200}

/* fade-in animation */
.fade-in{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* expanded log entry */
.log-entry{border-radius:9px;overflow:hidden;border:var(--bd)}
.log-header{display:flex;align-items:center;gap:14px;padding:12px 14px;cursor:pointer;background:var(--s1);transition:background .15s}
.log-header:hover{background:var(--s2)}
.log-body{padding:14px 16px;background:var(--s2);border-top:var(--bd);display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:9px">
      <div style="width:26px;height:26px;border-radius:7px;background:var(--acc);display:flex;align-items:center;justify-content:center">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#040d14" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <span style="font-size:15px;font-weight:800;letter-spacing:-.5px">Digital Sanctuary</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="hdr-date" style="font-size:11px;color:var(--t3)"></span>
      <button class="btn-icon" id="notes-toggle" onclick="toggleNotes()" style="border-radius:7px;padding:5px 9px;display:flex;align-items:center;gap:5px;border:1px solid transparent">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span style="font-size:11px;font-weight:600">Notes</span>
      </button>
    </div>
  </header>

  <main id="main-content"></main>

  <nav>
    <button class="nav-item active" data-tab="focus" onclick="switchTab('focus')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Focus</span>
    </button>
    <button class="nav-item" data-tab="tasks" onclick="switchTab('tasks')">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Tasks</span>
    </button>
    <button class="nav-item" data-tab="habits" onclick="switchTab('habits')">
      <svg viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      <span>Habits</span>
    </button>
    <button class="nav-item" data-tab="goals" onclick="switchTab('goals')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      <span>Goals</span>
    </button>
    <button class="nav-item" data-tab="journal" onclick="switchTab('journal')">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Journal</span>
    </button>
  </nav>
</div>

<!-- Notes Panel -->
<div id="notes-panel" class="notes-panel" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:var(--bd)">
    <span style="font-size:13px;font-weight:700">📝 Quick Notes</span>
    <button class="btn-icon" onclick="toggleNotes()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <textarea id="notes-text" placeholder="Brain dump anything here...&#10;Auto-saved to device." onchange="DB.set('notes',this.value)" oninput="DB.set('notes',this.value);document.getElementById('notes-chars').textContent=this.value.length+' chars'" style="width:100%;height:200px;background:transparent;border:none;padding:14px;color:var(--t1);font-size:13px;line-height:1.7;resize:none;outline:none"></textarea>
  <div style="padding:7px 14px;border-top:var(--bd);display:flex;justify-content:space-between;align-items:center">
    <span id="notes-chars" style="font-size:11px;color:var(--t3)">0 chars</span>
    <button class="btn-icon del" onclick="document.getElementById('notes-text').value='';DB.set('notes','');document.getElementById('notes-chars').textContent='0 chars'" style="font-size:11px;display:flex;gap:4px;align-items:center;padding:4px 8px">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Clear
    </button>
  </div>
</div>
<div id="notes-overlay" style="display:none;position:fixed;inset:0;z-index:199" onclick="toggleNotes()"></div>

<script>
// ═══════════════════════════
// STORAGE
// ═══════════════════════════
var DB = {
  get: function(k, def) {
    try { var v = localStorage.getItem('ds_' + k); return v !== null ? JSON.parse(v) : def; }
    catch(e) { return def; }
  },
  set: function(k, v) {
    try { localStorage.setItem('ds_' + k, JSON.stringify(v)); }
    catch(e) {}
  }
};

function uid() { return Math.random().toString(36).slice(2, 9); }
function fmt(s) { return ('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2); }
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function todayKey() { return new Date().toISOString().slice(0,10); }

// beep
function beep(f,d,v) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o = ctx.createOscillator(); var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = f||880; o.type = 'sine';
    g.gain.setValueAtTime(v||.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+(d||.15));
    o.start(); o.stop(ctx.currentTime+(d||.15));
  } catch(e) {}
}
function chime() { beep(880,.1,.25); setTimeout(function(){beep(1100,.1,.2);},120); setTimeout(function(){beep(1320,.2,.15);},250); }

// header date
document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

// notes
var notesOpen = false;
function toggleNotes() {
  notesOpen = !notesOpen;
  document.getElementById('notes-panel').style.display = notesOpen ? 'block' : 'none';
  document.getElementById('notes-overlay').style.display = notesOpen ? 'block' : 'none';
  var btn = document.getElementById('notes-toggle');
  btn.style.background = notesOpen ? 'var(--ambg)' : 'transparent';
  btn.style.color = notesOpen ? 'var(--amr)' : 'var(--t3)';
  btn.style.borderColor = notesOpen ? 'var(--ambdr)' : 'transparent';
  if (notesOpen) {
    var t = document.getElementById('notes-text');
    t.value = DB.get('notes','');
    document.getElementById('notes-chars').textContent = t.value.length + ' chars';
  }
}

// space bar for focus timer
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    if (typeof focusToggle === 'function') focusToggle();
  }
});

// ═══════════════════════════
// TAB ROUTER
// ═══════════════════════════
var currentTab = DB.get('tab','focus');
function switchTab(tab) {
  currentTab = tab;
  DB.set('tab', tab);
  document.querySelectorAll('.nav-item').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderTab();
}
function renderTab() {
  var mc = document.getElementById('main-content');
  mc.className = 'fade-in';
  mc.innerHTML = '';
  void mc.offsetWidth; // reflow to restart animation
  if (currentTab === 'focus')   renderFocus(mc);
  else if (currentTab === 'tasks')  renderTasks(mc);
  else if (currentTab === 'habits') renderHabits(mc);
  else if (currentTab === 'goals')  renderGoals(mc);
  else if (currentTab === 'journal') renderJournal(mc);
}
// init correct nav active state
document.querySelectorAll('.nav-item').forEach(function(b){
  b.classList.toggle('active', b.dataset.tab === currentTab);
});

// ═══════════════════════════
// FOCUS SCREEN
// ═══════════════════════════
var focusState = {
  mode: 'focus', // 'focus' | 'break'
  durs: DB.get('focus_durs', {focus:25, break:5}),
  sec: 0,
  running: false,
  timer: null,
  session: DB.get('sessions_'+todayKey(), 0),
  totalSec: DB.get('total_sec_'+todayKey(), 0),
  leaks: DB.get('leaks_'+todayKey(), [])
};
focusState.sec = focusState.durs[focusState.mode] * 60;

function focusToggle() {
  if (focusState.sec <= 0) return;
  focusState.running = !focusState.running;
  if (focusState.running) {
    focusState.timer = setInterval(focusTick, 1000);
  } else {
    clearInterval(focusState.timer);
  }
  if (currentTab === 'focus') renderTab();
}
function focusTick() {
  if (focusState.sec > 0) {
    focusState.sec--;
    if (focusState.mode === 'focus') {
      focusState.totalSec++;
      DB.set('total_sec_'+todayKey(), focusState.totalSec);
    }
    if (currentTab === 'focus') updateFocusTimer();
  }
  if (focusState.sec === 0) {
    clearInterval(focusState.timer);
    focusState.running = false;
    chime();
    if (focusState.mode === 'focus') {
      focusState.session++;
      DB.set('sessions_'+todayKey(), focusState.session);
      focusState.mode = 'break';
    } else {
      focusState.mode = 'focus';
    }
    focusState.sec = focusState.durs[focusState.mode] * 60;
    if (currentTab === 'focus') renderTab();
  }
}
function updateFocusTimer() {
  var el = document.getElementById('focus-time');
  var ring = document.getElementById('focus-ring');
  var dur = focusState.durs[focusState.mode] * 60;
  var prog = 1 - focusState.sec / dur;
  if (el) el.textContent = fmt(focusState.sec);
  if (ring) {
    var c = 2 * Math.PI * 100;
    ring.style.strokeDashoffset = c * (1 - prog);
  }
  var ts = document.getElementById('focus-total');
  if (ts) ts.textContent = fmt(focusState.totalSec);
}

function renderFocus(el) {
  var isBreak = focusState.mode === 'break';
  var sc = isBreak ? 'var(--grn)' : 'var(--acc)';
  var dur = focusState.durs[focusState.mode] * 60;
  var prog = 1 - focusState.sec / dur;
  var C = 2 * Math.PI * 100;
  var streak = DB.get('streak', 9);
  var lostMin = focusState.leaks.reduce(function(a,l){return a+l.t;},0);

  el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px">' +
    '<div style="display:flex;gap:8px;align-items:center">' +
      '<span class="chip '+(isBreak?'chip-green':'chip-blue')+'" style="font-size:12px;padding:4px 12px">'+(isBreak?'☕ Break':'⚡ Focus')+'</span>' +
      '<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--ambg);border:1px solid var(--ambdr);border-radius:6px">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="var(--amr)" stroke="none"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>' +
        '<span style="font-size:12px;font-weight:700;color:var(--amr)">' + streak + ' day streak</span>' +
      '</div>' +
    '</div>' +
    '<div style="text-align:right"><div class="sl" style="margin-bottom:2px">sessions</div><div style="font-size:20px;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums">'+focusState.session+'/4</div></div>' +
  '</div>' +

  // Ring
  '<div style="display:flex;justify-content:center;margin-bottom:24px">' +
    '<div style="position:relative;width:230px;height:230px">' +
      '<svg width="230" height="230" style="position:absolute;inset:0;transform:rotate(-90deg)">' +
        '<circle cx="115" cy="115" r="100" fill="none" stroke="var(--s3)" stroke-width="6"/>' +
        '<circle id="focus-ring" cx="115" cy="115" r="100" fill="none" stroke="'+sc+'" stroke-width="6" stroke-linecap="round" stroke-dasharray="'+C.toFixed(2)+'" stroke-dashoffset="'+(C*(1-prog)).toFixed(2)+'" style="transition:stroke-dashoffset 1s linear"/>' +
      '</svg>' +
      '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">' +
        '<div id="focus-time" style="font-size:56px;font-weight:800;color:'+sc+';line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums;cursor:pointer" onclick="editFocusDur()" title="Click to edit duration">'+fmt(focusState.sec)+'</div>' +
        '<div style="font-size:9px;color:var(--t3);font-weight:700;letter-spacing:2px;text-transform:uppercase">'+(focusState.running?(isBreak?'BREAK ACTIVE':'FLOW ACTIVE'):'TAP TIME TO EDIT')+'</div>' +
      '</div>' +
    '</div>' +
  '</div>' +

  // Controls
  '<div style="display:flex;justify-content:center;gap:14px;align-items:center;margin-bottom:20px">' +
    '<button class="btn-out" onclick="focusReset()" style="display:flex;align-items:center;gap:6px;font-size:12px">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>Reset' +
    '</button>' +
    '<button id="play-btn" onclick="focusToggle()" style="width:62px;height:62px;border-radius:50%;background:'+sc+';border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px '+(isBreak?'#3fb95040':'#58a6ff40')+'">' +
      (focusState.running
        ? '<div style="display:flex;gap:4px"><div style="width:4px;height:18px;background:#040d14;border-radius:2px"></div><div style="width:4px;height:18px;background:#040d14;border-radius:2px"></div></div>'
        : '<svg width="24" height="24" viewBox="0 0 24 24" fill="#040d14" style="margin-left:3px"><polygon points="5 3 19 12 5 21 5 3"/></svg>'
      ) +
    '</button>' +
    '<button onclick="logDistraction()" style="background:var(--ebg);border:1px solid var(--ebdr);border-radius:8px;padding:8px 12px;color:var(--err);font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px">' +

function toggleTask(id) {

function filterTasksLive(q) {

  if(list.length===0){el.innerHTML='<div style="text-align:center;padding:20px 0;color:var(--t3);font-size:13px">No match</div>';return;}
  el.innerHTML=list.map(function(t){
    var pc=t.pri==='high'?'chip-red':t.pri==='medium'?'chip-amber':'chip-gray';
    return '<div class="task-row" id="tr-'+t.id+'">'+
      '<div class="chk '+(t.done?'done':'')+'" onclick="toggleTask(\''+t.id+'\')">'+(t.done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>':'')+'</div>'+

    '</div>';
  }).join('');
}

          '<div style="font-size:16px;font-weight:700;color:'+(g.pct===100?'var(--grn)':'var(--t1)')+';margin-bottom:3px">'+(g.pct===100?'✅ ':'')+escHtml(g.title)+'</div>' +
          (g.desc?'<div style="font-size:12px;color:var(--t3);margin-bottom:3px">'+escHtml(g.desc)+'</div>':'') +
          (g.target&&g.target!=='—'?'<div style="display:flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span style="font-size:11px;color:var(--t3)">'+escHtml(g.target)+'</span></div>':'') +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-left:12px">' +
          '<input type="number" value="'+g.pct+'" min="0" max="100" onchange="setGoalPct(\''+g.id+'\',this.value)" style="width:50px;font-size:18px;font-weight:800;color:var(--acc);background:transparent;border:none;outline:none;text-align:right;font-variant-numeric:tabular-nums">' +
          '<span style="font-size:18px;font-weight:800;color:var(--acc)">%</span>' +
          '<button class="btn-icon del" onclick="deleteGoal(\''+g.id+'\')">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div class="pbar" style="margin-bottom:14px"><div class="pfill" style="width:'+g.pct+'%;background:'+(g.pct===100?'var(--grn)':'linear-gradient(90deg,var(--acc2),var(--acc))')+'"></div></div>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
        '<button class="btn-out" onclick="adjGoal(\''+g.id+'\',5)" style="font-size:12px;padding:5px 12px">+5%</button>' +
        '<button class="btn-out" onclick="adjGoal(\''+g.id+'\',-5)" style="font-size:12px;padding:5px 12px">-5%</button>' +
        '<button class="btn-out" onclick="adjGoal(\''+g.id+'\',10)" style="font-size:12px;padding:5px 12px">+10%</button>' +
        (g.pct<100?'<button onclick="setGoalPct(\''+g.id+'\',100)" style="font-size:12px;padding:5px 14px;background:var(--gbg);border:1px solid var(--gbdr);border-radius:7px;color:var(--grn);font-weight:700;cursor:pointer">✓ Mark done</button>':'') +
      '</div>' +
    '</div>';
  }).join('') +
  '<div class="card">' +
    '<div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:6px">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>New Goal' +
    '</div>' +
    '<input class="f-input" id="new-goal-title" placeholder="Goal title..." style="margin-bottom:12px">' +
    '<input class="f-input" id="new-goal-desc" placeholder="Description..." style="margin-bottom:12px">' +
    '<input class="f-input" id="new-goal-target" placeholder="Target date (e.g. Dec 2024)" style="margin-bottom:16px">' +
    '<button class="btn" onclick="addGoal()">Add Goal</button>' +
  '</div>';
}
function adjGoal(id,d) { var g=getGoals(); g=g.map(function(x){return x.id===id?Object.assign({},x,{pct:Math.min(100,Math.max(0,x.pct+d))}):x;}); saveGoals(g); if(currentTab==='goals') renderTab(); }
function setGoalPct(id,v) { var g=getGoals(); g=g.map(function(x){return x.id===id?Object.assign({},x,{pct:Math.min(100,Math.max(0,parseInt(v)||0))}):x;}); saveGoals(g); if(currentTab==='goals') renderTab(); }
function deleteGoal(id) { saveGoals(getGoals().filter(function(g){return g.id!==id;})); if(currentTab==='goals') renderTab(); }
function addGoal() {
  var t=document.getElementById('new-goal-title');
  var d=document.getElementById('new-goal-desc');
  var tg=document.getElementById('new-goal-target');
  if(!t||!t.value.trim()) return;
  var g=getGoals(); g.push({id:uid(),title:t.value.trim(),desc:d?d.value:'',pct:0,target:tg?tg.value||'—':'—'});
  saveGoals(g); if(currentTab==='goals') renderTab();
}

// ═══════════════════════════
// JOURNAL SCREEN
// ═══════════════════════════
var JOURNAL_DEF = [
  {id:uid(),date:23,month:'Mar',title:'High Output Saturday',tags:['Focus'],good:'Completed 3 deep sessions.',bad:'Skipped lunch.',why:'Poor planning.',mood:5},
  {id:uid(),date:22,month:'Mar',title:'Digital Fatigue',tags:['Distraction'],good:'Rested well.',bad:'Phone distractions.',why:'No DnD mode.',mood:2},
];
function getJournal() { return DB.get('journal',JOURNAL_DEF); }
var expandedLog = null;

function renderJournal(el) {
  var MOODS = ['😞','😔','😐','🙂','😊'];
  var MOOD_C = ['var(--err)','#f97316','var(--amr)','#84cc16','var(--grn)'];
  var savedState = DB.get('journal_saved_flash', false);

  el.innerHTML =
  '<div style="margin-bottom:20px"><div class="sl" style="display:block;margin-bottom:4px">internal audit</div><h2 style="font-size:32px;font-weight:800;letter-spacing:-1.5px;line-height:1">Journal</h2></div>' +

  // Entry form
  '<div class="card" style="margin-bottom:18px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<div style="font-size:15px;font-weight:700">Today\'s Entry</div>' +
      '<span class="chip '+(savedState?'chip-green':'chip-blue')+'" id="journal-badge">'+(savedState?'✓ Saved':'New')+'</span>' +
    '</div>' +

    // Mood
    '<div style="margin-bottom:18px">' +
      '<div class="sl" style="margin-bottom:10px">how was today?</div>' +
      '<div style="display:flex;gap:8px" id="mood-row">' +
        MOODS.map(function(m,i){
          var sel = (DB.get('journal_mood',3)-1===i);
          return '<button onclick="setMood('+(i+1)+')" style="flex:1;font-size:20px;padding:7px 0;border-radius:8px;border:2px solid '+(sel?MOOD_C[i]:'var(--s3)')+';background:'+(sel?MOOD_C[i]+'22':'var(--s2)')+';cursor:pointer;transition:all .15s">'+m+'</button>';
        }).join('') +
      '</div>' +
    '</div>' +

    '<div style="margin-bottom:14px"><div class="sl" style="margin-bottom:8px">what went well?</div><input class="f-input" id="j-good" placeholder="Deep work session..."></div>' +
    '<div style="margin-bottom:14px"><div class="sl" style="margin-bottom:8px">what failed?</div><input class="f-input" id="j-bad" placeholder="Got distracted..."></div>' +
    '<div style="margin-bottom:18px"><div class="sl" style="margin-bottom:8px">why? (root cause)</div><textarea class="f-textarea" id="j-why" rows="2" placeholder="Because..."></textarea></div>' +
    '<button class="btn" onclick="commitJournal()" style="width:100%;padding:12px;font-size:14px">Commit Entry</button>' +
  '</div>' +

  // Search
  '<div class="search-wrap" style="margin-bottom:14px">' +
    '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
    '<input class="search-input" placeholder="Search journal..." oninput="filterJournalLive(this.value)">' +
  '</div>' +

  // Logs
  '<div style="font-size:14px;font-weight:700;margin-bottom:12px">Past Entries <span style="font-size:12px;color:var(--t3);font-weight:400">('+getJournal().length+')</span></div>' +
  '<div id="journal-list" style="display:flex;flex-direction:column;gap:6px">' +
    renderJournalList(getJournal(), MOODS, MOOD_C) +
  '</div>';
}
function renderJournalList(logs, MOODS, MC) {
  if (!MOODS) { MOODS=['😞','😔','😐','🙂','😊']; MC=['var(--err)','#f97316','var(--amr)','#84cc16','var(--grn)']; }
  return logs.map(function(log){
    var isExp = expandedLog === log.id;
    return '<div class="log-entry">' +
      '<div class="log-header" onclick="expandLog(\''+log.id+'\')">' +
        '<div style="text-align:center;width:34px;flex-shrink:0">' +
          '<div class="sl">'+log.month+'</div>' +
          '<div style="font-size:18px;font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums">'+log.date+'</div>' +
        '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">' +
            (log.mood?'<span style="font-size:15px">'+MOODS[log.mood-1]+'</span>':'') +
            '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(log.title)+'</div>' +
          '</div>' +
          '<div style="display:flex;gap:4px">' + (log.tags||[]).map(function(t){return '<span class="chip chip-gray" style="font-size:10px">#'+t+'</span>';}).join('') + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:4px">' +
          '<button class="btn-icon del" onclick="event.stopPropagation();deleteLog(\''+log.id+'\')">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>' +
          '</button>' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" stroke-linecap="round" style="transition:transform .2s;transform:'+(isExp?'rotate(180deg)':'none')+'"><polyline points="6 9 12 15 18 9"/></svg>' +
        '</div>' +
      '</div>' +
      (isExp ? '<div class="log-body">' +
        (log.good?'<div><div style="font-size:10px;color:var(--grn);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Went well</div><div style="font-size:13px;color:var(--t2);line-height:1.6">'+escHtml(log.good)+'</div></div>':'') +
        (log.bad?'<div><div style="font-size:10px;color:var(--err);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Failed</div><div style="font-size:13px;color:var(--t2);line-height:1.6">'+escHtml(log.bad)+'</div></div>':'') +
        (log.why?'<div><div style="font-size:10px;color:var(--amr);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Root cause</div><div style="font-size:13px;color:var(--t2);line-height:1.6">'+escHtml(log.why)+'</div></div>':'') +
      '</div>' : '') +
    '</div>';
  }).join('');
}
function expandLog(id) { expandedLog = expandedLog===id?null:id; if(currentTab==='journal') renderTab(); }
function deleteLog(id) {
  var logs=getJournal().filter(function(l){return l.id!==id;});
  DB.set('journal',logs); if(currentTab==='journal') renderTab();
}
function setMood(v) { DB.set('journal_mood',v); if(currentTab==='journal') renderTab(); }
function commitJournal() {
  var g=document.getElementById('j-good');
  var b=document.getElementById('j-bad');
  var w=document.getElementById('j-why');
  if(!g||(!g.value&&!b.value)) return;
  var now=new Date();
  var entry={id:uid(),date:now.getDate(),month:MONTHS[now.getMonth()],title:(g.value||'Reflection').slice(0,40),tags:['New'],good:g?g.value:'',bad:b?b.value:'',why:w?w.value:'',mood:DB.get('journal_mood',3)};
  var logs=getJournal(); logs.unshift(entry); DB.set('journal',logs);
  DB.set('journal_saved_flash',true); setTimeout(function(){DB.set('journal_saved_flash',false);},3000);
  if(currentTab==='journal') renderTab();
}
function filterJournalLive(q) {
  var logs=getJournal().filter(function(l){return l.title.toLowerCase().includes(q.toLowerCase());});
  var el=document.getElementById('journal-list'); if(el) el.innerHTML=renderJournalList(logs,null,null);
}

// ═══════════════════════════
// INIT
// ═══════════════════════════
renderTab();
</script>
</body>
</html>
